<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Ahoy…</title>
  <link rel="canonical" href="https://app.ahoy.ooo" />
  <meta http-equiv="refresh" content="2; url=https://app.ahoy.ooo" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
      background-attachment: fixed;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 20s ease-in-out infinite;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #3b82f6 0%, #1e40af 100%);
      top: -200px;
      left: -200px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #8b5cf6 0%, #5b21b6 100%);
      bottom: -150px;
      right: -150px;
      animation-delay: 5s;
    }

    .blob-3 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, #06b6d4 0%, #0891b2 100%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(30px, -30px) scale(1.1);
      }
      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }
    }

    /* Glass container */
    .container {
      position: relative;
      z-index: 10;
      backdrop-filter: blur(20px) saturate(180%);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 64px 48px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      text-align: center;
      max-width: 600px;
      width: 90%;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo/Brand */
    .brand {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 24px;
      text-shadow: 0 2px 20px rgba(255, 255, 255, 0.1);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.95;
      }
      50% {
        opacity: 1;
      }
    }

    /* Main message */
    .message {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    /* Link */
    .link {
      display: inline-block;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      padding: 16px 32px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .link:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .link:hover::before {
      left: 100%;
    }

    /* Loading indicator */
    .loader {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      40% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .container {
        padding: 48px 32px;
      }

      .brand {
        font-size: 36px;
      }

      .message {
        font-size: 18px;
      }

      .link {
        font-size: 16px;
        padding: 14px 28px;
      }
    }

    /* Subtle shine effect */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      animation: shine 3s ease-in-out infinite;
    }

    @keyframes shine {
      0% {
        left: -100%;
      }
      50%, 100% {
        left: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="brand">AHOY</div>
    <div class="message">Taking you to the app...</div>
    <a href="https://app.ahoy.ooo" class="link">app.ahoy.ooo</a>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // Smooth redirect after a brief moment
    setTimeout(() => {
      window.location.replace("https://app.ahoy.ooo");
    }, 1500);

    // Fallback: redirect on link click
    document.querySelector('.link').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.replace("https://app.ahoy.ooo");
    });
  </script>
</body>
</html>
