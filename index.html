<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taking you to Ahoy…</title>
  <link rel="canonical" href="https://app.ahoy.ooo" />
  <script>
    // Handle redirects and prevent loops
    (function() {
      const host = window.location.hostname;
      if (host === 'app.ahoy.ooo') {
        // If we hit the app subdomain but it still points to the landing page repo,
        // redirect to the actual app subfolder.
        window.location.replace('/ahoyApp/www/index.html');
      }
    })();
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .logo {
      width: 240px;
      height: auto;
      max-width: 80%;
      margin-bottom: 32px;
    }

    .message {
      font-size: 1.1rem;
      font-weight: 400;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    /* Simple loading dots */
    .dots {
      margin-top: 12px;
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.3;
      animation: pulse 1.5s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <img src="./u_ahoy23.png" alt="Ahoy Indie Media" class="logo" />
  <div class="message">Taking you to the app</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    // Trigger the redirect after a short delay
    setTimeout(() => {
      if (window.location.hostname !== 'app.ahoy.ooo') {
        window.location.replace("https://app.ahoy.ooo");
      }
    }, 1000);
  </script>
</body>
</html>
